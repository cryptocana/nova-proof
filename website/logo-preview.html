<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #0a0a0a; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; flex-direction: column; gap: 40px; }
  .preview { display: flex; align-items: center; gap: 40px; }
  .size-label { color: #555; font-family: monospace; font-size: 12px; text-align: center; margin-top: 8px; }
</style>
</head>
<body>
  <div class="preview">
    <div>
      <img src="logo.svg" width="128" height="128">
      <div class="size-label">128px</div>
    </div>
    <div>
      <img src="logo.svg" width="64" height="64">
      <div class="size-label">64px</div>
    </div>
    <div>
      <img src="logo.svg" width="32" height="32">
      <div class="size-label">32px</div>
    </div>
    <div>
      <img src="logo.svg" width="16" height="16">
      <div class="size-label">16px</div>
    </div>
  </div>
</body>
</html>
