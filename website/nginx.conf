server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  location = / { try_files /index.html =404; }
  location = /agents { try_files /agents.html =404; }
  location = /leaderboard { try_files /leaderboard.html =404; }
  location = /verify { try_files /verify.html =404; }
  location = /docs { try_files /docs.html =404; }
  location /agent { try_files /agent.html =404; }

  location / { try_files $uri $uri.html $uri/ =404; }
}
