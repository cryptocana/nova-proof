# fly.toml — NovaProof Relayer (Gelato-sponsored, no private keys)
#
# See https://fly.io/docs/reference/configuration/

app = 'novaproof-relayer'
primary_region = 'ewr'

[build]

[env]
  # GELATO_SPONSOR_KEY is set via `fly secrets` — never in this file

[http_service]
  internal_port = 3200
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
